<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    window.addEventListener('load', async () => {
      const SUPABASE_URL = 'https://ngpbnhyuwvbcmdwpuhxq.supabase.co';
      const SUPABASE_KEY = 'YOUR_ANON_KEY';

      const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const params = new URLSearchParams(window.location.search);

      const promoter = params.get('promoter') || 'unknown';
      const platform = params.get('platform') || 'unknown';
      const campaign = params.get('campaign') || 'default';
      let dest = params.get('dest');

      if (!dest) {
        document.body.innerHTML = `
          <div style="font-family:sans-serif;padding:40px;text-align:center;">
            <h1>Fanzolinks</h1>
            <p>Missing destination.</p>
          </div>
        `;
        return;
      }

      try {
        dest = decodeURIComponent(dest);
      } catch {}

      const extraParams = new URLSearchParams({
        promoter,
        platform,
        campaign
      }).toString();

      const separator = dest.includes('?') ? '&' : '?';
      const finalUrl = dest + separator + extraParams;

      document.body.innerHTML = `
        <div style="font-family:sans-serif;padding:40px;text-align:center;">
          <h1>Fanzolinks</h1>
          <p>Redirecting...</p>
        </div>
      `;

      // Collect metadata
      const userAgent = navigator.userAgent;
      const clickDate = new Date().toISOString().split('T')[0];

      // Get IP (important: browser cannot directly access it)
      let ip = null;
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        ip = data.ip;
      } catch {}

      // Insert into Supabase
      try {
        await client.from('clicks').insert([
          {
            promoter,
            platform,
            destination: dest,
            ip_address: ip,
            user_agent: userAgent,
            created_at: new Date().toISOString(),
            click_date: clickDate
          }
        ]);
      } catch (err) {
        console.error('Insert failed:', err);
      }

      // Small delay to avoid losing logs in strict environments
      setTimeout(() => {
        window.location.href = finalUrl;
      }, 150);
    });
  </script>
</head>

<body></body>
</html>
