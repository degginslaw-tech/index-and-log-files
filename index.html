<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .fade-scale {
      opacity: 0;
      transform: scale(0.95);
      animation: fadeInScale 0.6s ease-out forwards;
    }

    @keyframes fadeInScale {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
<script>
function showError(message) {
  document.body.innerHTML = `
    <div style="font-family:sans-serif;padding:40px;text-align:center;">
      <h1>Fanzolinks</h1>
      <p>${message}</p>
    </div>
  `;
}

window.addEventListener('load', async () => {

  // ⚠️ USE YOUR REAL KEY HERE
  const SUPABASE_URL = 'https://ngpbnhyuwvbcmdwpuhxq.supabase.co';
  const SUPABASE_KEY = 'REPLACE_WITH_REAL_ANON_KEY';

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // -----------------------------
  // GET PARAMS
  // -----------------------------
  const params = new URLSearchParams(window.location.search);

  const promoter = params.get('promoter') || 'unknown';
  const platform = params.get('platform') || 'unknown';
  const campaign = params.get('campaign') || null;
  let dest = params.get('dest');

  // -----------------------------
  // VALIDATE DEST
  // -----------------------------
  if (!dest) {
    showError("Missing destination.");
    return;
  }

  try {
    dest = decodeURIComponent(dest.trim());
  } catch {}

  let urlObj;
  try {
    urlObj = new URL(dest);
  } catch {
    showError("Invalid destination URL.");
    return;
  }

  if (urlObj.protocol !== "https:") {
    showError("Destination must use HTTPS.");
    return;
  }

  // -----------------------------
  // ADD TRACKING PARAMS
  // -----------------------------
  urlObj.searchParams.set("promoter", promoter);
  urlObj.searchParams.set("platform", platform);
  urlObj.searchParams.set("campaign", campaign || "default");

  const finalUrl = urlObj.toString();

  // -----------------------------
  // UI
  // -----------------------------
  document.body.innerHTML = `
    <div style="font-family:sans-serif;padding:40px;text-align:center;">
      <h1 class="fade-scale">Fanzolinks</h1>
      <p class="fade-scale" style="animation-delay:0.15s;">
        Logging your click...
      </p>
    </div>
  `;

  // -----------------------------
  // METADATA
  // -----------------------------
  const userAgent = navigator.userAgent;
  const clickDate = new Date().toISOString().split('T')[0];
  const createdAt = new Date().toISOString();

  let ip = null;
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    const data = await res.json();
    ip = data.ip;
  } catch {}

  // -----------------------------
  // INSERT + DEBUG ALERT
  // -----------------------------
  let insertResult;

  try {
    const { data, error } = await client
      .from('clicks')
      .insert([{
        promoter,
        platform,
        campaign,
        destination: finalUrl,
        ip_address: ip,
        user_agent: userAgent,
        created_at: createdAt,
        click_date: clickDate
      }])
      .select();

    insertResult = {
      success: !error,
      data,
      error: error ? {
        message: error.message,
        details: error.details,
        hint: error.hint
      } : null
    };

  } catch (err) {
    insertResult = {
      success: false,
      error: { message: err.message }
    };
  }

  // 🔥 SHOW EXACT RESULT
  alert(JSON.stringify(insertResult, null, 2));

  // -----------------------------
  // REDIRECT AFTER ALERT
  // -----------------------------
  window.location.href = finalUrl;

});
</script>
</body>
</html>
