<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .fade-scale {
      opacity: 0;
      transform: scale(0.95);
      animation: fadeInScale 0.6s ease-out forwards;
    }

    @keyframes fadeInScale {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>

  <script>
    function showError(message) {
      document.body.innerHTML = `
        <div style="font-family:sans-serif;padding:40px;text-align:center;">
          <h1>Fanzolinks</h1>
          <p>${message}</p>
        </div>
      `;
    }

    window.addEventListener('load', async () => {
      const SUPABASE_URL = 'https://ngpbnhyuwvbcmdwpuhxq.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ncGJuaHl1d3ZiY21kd3B1aHhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODYzNTAsImV4cCI6MjA4OTY2MjM1MH0.5pjzETSCFb-YjxSYxq8MX7t3ZyOEGlQ_dIkx_am3jLw';

      const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // Get URL parameters
      const params = new URLSearchParams(window.location.search);
      const promoter = params.get('promoter') || 'unknown';
      const platform = params.get('platform') || 'unknown';
      const campaign = params.get('campaign') || 'default';
      let dest = params.get('dest');

      // -----------------------------
      // FULL DEST VALIDATION
      // -----------------------------
      if (!dest) {
        showError("Missing destination.");
        return;
      }

      // Trim whitespace + hidden characters
      dest = dest.trim();

      // Attempt to decode safely
      try {
        dest = decodeURIComponent(dest);
      } catch (e) {
        console.warn("Decode failed, using raw dest:", e);
      }

      // Auto-encode if promoter pasted raw URL
      try {
        new URL(dest); // If this fails, dest is not a valid URL
      } catch {
        try {
          dest = encodeURI(dest);
          new URL(dest); // Validate again
        } catch {
          showError("Invalid destination URL.");
          return;
        }
      }

      // Must be HTTPS
      if (!dest.startsWith("https://")) {
        showError("Destination must be a secure HTTPS link.");
        return;
      }

      // Build final redirect URL with tracking params
      const extraParams = new URLSearchParams({ promoter, platform, campaign }).toString();
      const separator = dest.includes('?') ? '&' : '?';
      const finalUrl = dest + separator + extraParams;

      // Animated success message
      document.body.innerHTML = `
        <div style="font-family:sans-serif;padding:40px;text-align:center;">
          <h1 class="fade-scale">Fanzolinks</h1>

          <p class="fade-scale" style="animation-delay:0.15s;">
            Thank you for submitting your form. You're one step closer to becoming a FANZO.
          </p>

          <p class="fade-scale" style="animation-delay:0.3s;">
            Redirecting in 3 seconds...
          </p>
        </div>
      `;

      // Collect metadata
      const userAgent = navigator.userAgent;
      const clickDate = new Date().toISOString().split('T')[0];

      // Fetch IP (optional)
      let ip = null;
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        ip = data.ip;
      } catch (e) {
        console.warn('Failed to fetch IP:', e);
      }

      // Insert into Supabase
      try {
        const { data, error } = await client.from('clicks').insert([{
          promoter,
          platform,
          campaign,     // <-- FIXED: Now inserting campaign
          destination: dest,
          ip_address: ip,
          user_agent: userAgent,
          created_at: new Date().toISOString(),
          click_date: clickDate
        }]);

        if (error) console.error('Supabase insert error:', error);
        else console.log('Click logged successfully:', data);
      } catch (err) {
        console.error('Unexpected insert error:', err);
      }

      // Delay 3 seconds before redirecting
      setTimeout(() => {
        window.location.href = finalUrl;
      }, 3000);
    });
  </script>
</head>

<body></body>
</html>
