<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Supabase JS library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    window.addEventListener('load', async () => {
      // Initialize Supabase with your project
      const supabaseUrl = 'https://ngpbnhyuwvbcmdwpuhxq.supabase.co';
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ncGJuaHl1d3ZiY21kd3B1aHhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODYzNTAsImV4cCI6MjA4OTY2MjM1MH0.5pjzETSCFb-YjxSYxq8MX7t3ZyOEGlQ_dIkx_am3jLw';
      const supabase = supabase.createClient(supabaseUrl, supabaseKey);

      // Read URL parameters
      const params = new URLSearchParams(window.location.search);
      const promoter = params.get('promoter') || 'unknown';
      const platform = params.get('platform') || 'unknown';
      const campaign = params.get('campaign') || 'default';
      let dest = params.get('dest');

      // Fallback if no destination
      if (!dest) {
        document.body.innerHTML = `
          <div style="font-family: sans-serif; padding: 40px;">
            <h1>Fanzolinks</h1>
            <p>This link is missing a destination.</p>
            <a href="https://fanzolinks.com"
               style="display:inline-block;padding:12px 22px;background:#007bff;color:white;border-radius:6px;text-decoration:none;font-weight:bold;">
              Go to the main site
            </a>
          </div>
        `;
        return;
      }

      // Safely decode destination if encoded
      try {
        dest = decodeURIComponent(dest);
      } catch (e) {
        // ignore
      }

      // Build final redirect URL with extra parameters
      const extraParams = new URLSearchParams({ promoter, platform, campaign }).toString();
      const separator = dest.includes('?') ? '&' : '?';
      const finalUrl = dest + separator + extraParams;

      // Show redirecting message
      document.body.innerHTML = `
        <div style="font-family: sans-serif; padding: 40px;">
          <h1>Fanzolinks</h1>
          <p>Redirecting…</p>
        </div>
      `;

      // Log click to Supabase before redirect
      try {
        await supabase.from('clicks').insert([
          {
            promoter,
            platform,
            campaign,
            destination: dest,
            created_at: new Date().toISOString()
          }
        ]);
      } catch (err) {
        console.error('Supabase insert failed:', err);
      }

      // Redirect
      window.location.href = finalUrl;
    });
  </script>
</head>

<body>
</body>
</html>
