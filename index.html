<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script>
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);

      const promoter = params.get('promoter') || 'unknown';
      const platform = params.get('platform') || 'unknown';
      const campaign = params.get('campaign') || 'default';
      const dest = params.get('dest');

      // If no destination, show fallback
      if (!dest) {
        document.body.innerHTML = `
          <div style="font-family: sans-serif; padding: 40px;">
            <h1>Fanzolinks</h1>
            <p>This link is missing a destination.</p>
            <a href="https://fanzolinks.com"
               style="display:inline-block;padding:12px 22px;background:#007bff;color:white;border-radius:6px;text-decoration:none;font-weight:bold;">
              Go to the main site
            </a>
          </div>
        `;
        return;
      }

      // Build final redirect URL with attribution params
      const finalUrl = new URL(dest);
      finalUrl.searchParams.set('promoter', promoter);
      finalUrl.searchParams.set('platform', platform);
      finalUrl.searchParams.set('campaign', campaign);

      // Show message immediately
      document.body.innerHTML = `
        <div style="font-family: sans-serif; padding: 40px;">
          <h1>Fanzolinks</h1>
          <p>Redirecting…</p>
        </div>
      `;

      // Redirect after a short delay (ensures message renders)
      setTimeout(() => {
        window.location.href = finalUrl.toString();
      }, 150);
    });
  </script>
</head>

<body>
</body>
</html>
