<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    window.addEventListener('load', async () => {

      const supabaseUrl = 'https://ngpbnhyuwvbcmdwpuhxq.supabase.co';
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ncGJuaHl1d3ZiY21kd3B1aHhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODYzNTAsImV4cCI6MjA4OTY2MjM1MH0.5pjzETSCFb-YjxSYxq8MX7t3ZyOEGlQ_dIkx_am3jLw';
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      const params = new URLSearchParams(window.location.search);
      const promoter = params.get('promoter') || 'unknown';
      const platform = params.get('platform') || 'unknown';
      let dest = params.get('dest');

      if (!dest) {
        document.body.innerHTML = `
          <div style="font-family: sans-serif; padding: 40px;">
            <h1>Fanzolinks</h1>
            <p>This link is missing a destination.</p>
            <a href="https://fanzolinks.com">Go to main site</a>
          </div>
        `;
        return;
      }

      try {
        dest = decodeURIComponent(dest);
      } catch (e) {}

      const extraParams = new URLSearchParams({ promoter, platform }).toString();
      const separator = dest.includes('?') ? '&' : '?';
      const finalUrl = dest + separator + extraParams;

      document.body.innerHTML = `
        <div style="font-family: sans-serif; padding: 40px;">
          <h1>Fanzolinks</h1>
          <p>Redirecting…</p>
        </div>
      `;

      // ✅ Capture browser data
      const userAgent = navigator.userAgent;
      const clickDate = new Date().toISOString().split('T')[0];

      // ⚠️ IP can't be reliably captured client-side without a service
      const ipAddress = null;

      try {
        const { data, error } = await supabase
          .from('clicks')
          .insert([
            {
              promoter,
              platform,
              destination: dest,
              user_agent: userAgent,
              ip_address: ipAddress,
              created_at: new Date().toISOString(),
              click_date: clickDate
            }
          ]);

        if (error) {
          console.error('❌ INSERT ERROR:', error);
        } else {
          console.log('✅ INSERT SUCCESS:', data);
        }

      } catch (err) {
        console.error('❌ INSERT FAILED:', err);
      }

      // Give it time before redirect
      setTimeout(() => {
        window.location.href = finalUrl;
      }, 800);

    });
  </script>
</head>

<body>
</body>
</html>
