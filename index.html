<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4F1FJKGFTF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-4F1FJKGFTF');
  </script>

  <script>
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);

      // Required attribution params
      const promoter = params.get('promoter') || 'unknown';
      const platform = params.get('platform') || 'unknown';
      const campaign = params.get('campaign') || 'default';
      const debug = params.get('debug');

      // STRICT: dest only
      let dest = params.get('dest');
      if (dest) {
        try { dest = decodeURIComponent(dest); } catch (e) {}
      }

      const messageEl = document.getElementById("message");
      if (!messageEl) {
        document.body.innerHTML = "Error: message element missing.";
        return;
      }

      // Missing destination fallback
      if (!dest) {
        messageEl.innerHTML = `
          <div style="font-family: sans-serif; line-height: 1.5;">
            <strong style="font-size: 32px;">Fanzolinks…</strong><br><br>
            This link is missing a destination.<br><br>

            <a href="https://fanzolinks.com"
               style="
                 display: inline-block;
                 padding: 12px 22px;
                 background-color: #007bff;
                 color: white;
                 border-radius: 6px;
                 text-decoration: none;
                 font-weight: bold;
                 font-size: 18px;
               ">
              Go to the main site
            </a>
          </div>
        `;
        return;
      }

      // ⭐ Show user-facing message immediately
      messageEl.innerHTML = `
        <div style="font-family: sans-serif; line-height: 1.5;">
          <strong style="font-size: 32px;">Fanzolinks…</strong><br><br>
          Redirecting…
        </div>
      `;

      // ⭐ BLOCKING LOG + REDIRECT
      (async () => {

        // Fire GA4
        gtag('event', 'redirect_click', {
          promoter,
          platform,
          campaign,
          dest
        });

        // BLOCKING POST to /log
        try {
          await fetch("/log", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              promoter,
              platform,
              dest,
              user_agent: navigator.userAgent
            })
          });
        } catch (e) {
          console.error("Log error:", e);
        }

        // Debug mode stops redirect
        if (debug) {
          messageEl.innerHTML = `
            <div style="font-family: sans-serif; line-height: 1.5;">
              <strong style="font-size: 28px;">Debug Mode Active</strong><br><br>
              Redirect disabled so you can inspect console logs.<br><br>
              Destination:<br>
              <code>${dest}</code>
            </div>
          `;
          return;
        }

        // Redirect AFTER log completes
        window.location.replace(dest);

      })();
    });
  </script>
</head>

<body>
  <div id="message" style="font-family: sans-serif; font-size: 22px; padding: 40px;">
    Fanzolinks… Redirecting…
  </div>
</body>
</html>
